<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ideal Hunza Transport</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
      padding: 12px;
    }
    .app {
      max-width: 480px;
      margin: auto;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }
    .header {
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: white;
      padding: 20px 16px;
      text-align: center;
    }
    .header h1 {
      font-size: 24px;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    .section {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .section h2 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #1e3a8a;
    }
    input, select, button, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 15px;
    }
    button {
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { opacity: 0.95; }
    .btn-green { background: #16a34a; }
    .btn-dark { background: #111827; }
    .btn-orange { background: #ea580c; }
    .btn-red { background: #dc2626; }
    .btn-gray { background: #374151; }
    .small {
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
    }
    .driver-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      margin-top: 12px;
    }
    .driver-card h3 {
      margin-bottom: 6px;
      color: #111827;
    }
    .driver-card p {
      margin: 4px 0;
      font-size: 14px;
    }
    .driver-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
    }
    .footer {
      padding: 16px;
      text-align: center;
      font-size: 13px;
      color: #6b7280;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Ideal Hunza Transport</h1>
      <p>Passenger & Driver Nearby Transport Service</p>
    </div>

    <div class="section">
      <h2>Passenger Side</h2>
      <input type="text" id="passengerName" placeholder="Passenger Name" />
      <input type="text" id="pickup" placeholder="Pickup Location" />
      <input type="text" id="dropoff" placeholder="Drop Location" />
      <button onclick="findDrivers()">Search Nearest Driver</button>
      <div id="searchStatus" class="status hidden"></div>
      <div id="driverResults"></div>
    </div>

    <div class="section">
      <h2>Driver Registration</h2>
      <input type="text" id="driverName" placeholder="Driver Name" />
      <input type="text" id="driverPhone" placeholder="Phone Number (03xxxxxxxxx)" />
      <input type="text" id="driverVehicle" placeholder="Vehicle / Animal (e.g. Suzuki, Pickup, Ghora, Khachar)" />
      <input type="text" id="driverArea" placeholder="Area / Route (e.g. Hunza, Bagh, Pir Chinasi)" />
      <button class="btn-green" onclick="registerDriver()">Submit Registration</button>
      <div id="driverStatus" class="status hidden"></div>
    </div>

    <div class="section">
      <h2>Quick Share</h2>
      <textarea id="shareText" rows="4" placeholder="Type message for WhatsApp share...">Ideal Hunza Transport ready hai. Passenger aur driver dono ke liye app available hai.</textarea>
      <button class="btn-dark" onclick="shareWhatsApp()">Share on WhatsApp</button>
      <p class="small">WhatsApp installed hona chahiye.</p>
    </div>

    <div class="footer">
      Ideal Hunza Transport © 2026
    </div>
  </div>

  <script>
    let drivers = [
      {
        name: "Ayub Driver",
        phone: "03001234567",
        vehicle: "Suzuki Pickup",
        area: "Hunza"
      },
      {
        name: "Naseer Transport",
        phone: "03111234567",
        vehicle: "Mazda Loader",
        area: "Bagh"
      }
    ];

    function showStatus(id, text) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.classList.remove("hidden");
    }

    function registerDriver() {
      const name = document.getElementById("driverName").value.trim();
      const phone = document.getElementById("driverPhone").value.trim();
      const vehicle = document.getElementById("driverVehicle").value.trim();
      const area = document.getElementById("driverArea").value.trim();

      if (!name || !phone || !vehicle || !area) {
        showStatus("driverStatus", "Please fill all driver details.");
        return;
      }

      drivers.push({ name, phone, vehicle, area });

      showStatus("driverStatus", "Driver registered successfully!");

      document.getElementById("driverName").value = "";
      document.getElementById("driverPhone").value = "";
      document.getElementById("driverVehicle").value = "";
      document.getElementById("driverArea").value = "";
    }

    function findDrivers() {
      const passengerName = document.getElementById("passengerName").value.trim();
      const pickup = document.getElementById("pickup").value.trim();
      const dropoff = document.getElementById("dropoff").value.trim();
      const results = document.getElementById("driverResults");

      if (!passengerName || !pickup || !dropoff) {
        showStatus("searchStatus", "Please fill passenger name, pickup and drop location.");
        return;
      }

      showStatus("searchStatus", "Nearest drivers found below.");
      results.innerHTML = "";

      drivers.forEach(driver => {
        const card = document.createElement("div");
        card.className = "driver-card";
        card.innerHTML = `
          <h3>${driver.name}</h3>
          <p><strong>Phone:</strong> ${driver.phone}</p>
          <p><strong>Vehicle:</strong> ${driver.vehicle}</p>
          <p><strong>Area:</strong> ${driver.area}</p>
          <div class="driver-actions">
            <button class="btn-green" onclick="callDriver('${driver.phone}')">Call Driver</button>
            <button class="btn-dark" onclick="messageDriver('${driver.phone}', '${driver.name}', '${pickup}', '${dropoff}', '${passengerName}')">WhatsApp</button>
          </div>
        `;
        results.appendChild(card);
      });
    }

    function callDriver(phone) {
      window.location.href = "tel:" + phone;
    }

    function messageDriver(phone, name, pickup, dropoff, passengerName) {
      const msg = `Assalam o Alaikum ${name},%0A%0APassenger: ${passengerName}%0APickup: ${pickup}%0ADrop: ${dropoff}%0A%0AIdeal Hunza Transport se request bheji gayi hai.`;
      window.open(`https://wa.me/92${phone.substring(1)}?text=${msg}`, "_blank");
    }

    function shareWhatsApp() {
      const text = document.getElementById("shareText").value.trim();
      if (!text) {
        alert("Please type message first.");
        return;
      }
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
    }
  </script>
</body>
</html>
